{{ with .Params.hero }}
<section class="hero">
  <div class="hero-court-lines">
    <div class="court-doubles"></div>
    <div class="court-singles"></div>
    <div class="court-net"></div>
    <div class="court-service-left"></div>
    <div class="court-service-right"></div>
    <div class="court-center-left"></div>
    <div class="court-center-right"></div>
  </div>
  <div class="hero-content">
    <p class="label-upper hero-eyebrow">{{ .eyebrow }}</p>
    <h1 class="heading-display hero-title">Tennisclub Blau-Weiss<br>Attendorn e.V.</h1>
    <p class="hero-subtitle">{{ .subtitle }}</p>
    <p class="hero-year">Seit {{ $.Site.Params.founded }}</p>
    <div class="hero-actions">
      {{ with .cta_primary }}<a href="{{ .url }}" class="btn btn-primary">{{ .text }}</a>{{ end }}
      {{ with .cta_secondary }}<a href="{{ .url }}" class="btn btn-outline">{{ .text }}</a>{{ end }}
    </div>
  </div>
</section>
{{ end }}
