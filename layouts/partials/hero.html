{{ with .Params.hero }}
<section class="hero">
  <div class="hero-court-lines">
    <!-- Outer singles court -->
    <div class="court-outline"></div>
    <!-- Center service line (horizontal) -->
    <div class="court-service-line"></div>
    <!-- Center mark (short vertical at baseline center) -->
    <div class="court-center-mark"></div>
    <!-- Net / center line (vertical) -->
    <div class="court-net"></div>
    <!-- Left doubles alley -->
    <div class="court-doubles-left"></div>
    <!-- Right doubles alley -->
    <div class="court-doubles-right"></div>
  </div>
  <div class="hero-content">
    <p class="label-upper hero-eyebrow">{{ .eyebrow }}</p>
    <h1 class="heading-display hero-title">TC Blau-Weiss<br>Attendorn</h1>
    <p class="hero-subtitle">{{ .subtitle }}</p>
    <p class="hero-year">Seit {{ $.Site.Params.founded }}</p>
    <div class="hero-actions">
      {{ with .cta_primary }}<a href="{{ .url }}" class="btn btn-primary">{{ .text }}</a>{{ end }}
      {{ with .cta_secondary }}<a href="{{ .url }}" class="btn btn-outline">{{ .text }}</a>{{ end }}
    </div>
  </div>
</section>
{{ end }}
