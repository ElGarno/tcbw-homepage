{{ define "main" }}
<article class="article-detail">
  <div class="article-detail-header">
    <div class="container" style="max-width: 760px;">
      <a href="/aktuelles/" class="article-detail-back">&larr; Alle Berichte</a>
      <div class="article-detail-meta">
        <time class="article-detail-date">{{ .Date.Format "2. January 2006" }}</time>
        {{ with .Params.tags }}
        <div class="article-detail-tags">
          {{ range . }}<span class="article-detail-tag">{{ . }}</span>{{ end }}
        </div>
        {{ end }}
      </div>
      <h1 class="article-detail-title">{{ .Title }}</h1>
      {{ with .Description }}
      <p class="article-detail-description">{{ . }}</p>
      {{ end }}
    </div>
  </div>

  <div class="container" style="max-width: 760px;">
    {{ with .Params.image }}
    <div class="article-detail-image">
      <img src="{{ . }}" alt="{{ $.Title }}">
    </div>
    {{ end }}

    <div class="article-detail-content">
      {{ .Content }}
    </div>

    <div class="article-detail-footer">
      <a href="/aktuelles/" class="btn-secondary">&larr; Zurück zu Aktuelles</a>
    </div>
  </div>
</article>
{{ end }}
